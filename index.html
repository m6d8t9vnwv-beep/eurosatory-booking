<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Переговорна кімната — Eurosatory 2026</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #185FA5; --blue-light: #E6F1FB; --blue-dark: #0C447C;
    --text: #1a1a1a; --text-sec: #6b6b6b; --text-ter: #999;
    --bg: #f7f7f5; --surface: #ffffff;
    --border: rgba(0,0,0,0.10); --border-med: rgba(0,0,0,0.18);
    --success-bg: #EAF3DE; --success-text: #27500A;
    --error-bg: #FCEBEB; --error-text: #791F1F;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --text: #f0f0ee; --text-sec: #aaa; --text-ter: #777;
      --bg: #141414; --surface: #1e1e1e;
      --border: rgba(255,255,255,0.10); --border-med: rgba(255,255,255,0.18);
      --blue-light: #0d2e4a;
      --success-bg: #173404; --success-text: #C0DD97;
      --error-bg: #2e0f0f; --error-text: #F09595;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .top-bar { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .top-bar-left { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 28px; height: 28px; background: var(--blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo-dot svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .top-bar h1 { font-size: 15px; font-weight: 500; }
  .top-bar p { font-size: 12px; color: var(--text-sec); margin-top: 1px; }
  .admin-btn { font-size: 12px; color: var(--text-sec); background: none; border: 0.5px solid var(--border-med); border-radius: var(--radius); padding: 5px 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
  .admin-btn:hover { background: var(--bg); }
  .admin-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  .main { max-width: 720px; margin: 0 auto; padding: 24px 20px 48px; }

  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .stat-num { font-size: 26px; font-weight: 500; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-sec); margin-top: 4px; }

  .days-row { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
  .day-btn { padding: 7px 16px; border: 0.5px solid var(--border-med); border-radius: 100px; background: var(--surface); font-size: 13px; color: var(--text-sec); cursor: pointer; transition: all 0.12s; }
  .day-btn:hover { border-color: var(--blue); color: var(--blue); }
  .day-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-ter); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .refresh-btn { background: none; border: none; color: var(--text-ter); cursor: pointer; font-size: 13px; padding: 0; line-height: 1; }
  .refresh-btn:hover { color: var(--blue); }
  .spinning { animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 24px; }
  .slot { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; cursor: pointer; transition: all 0.12s; min-height: 62px; }
  .slot:hover:not(.booked) { border-color: var(--blue); background: var(--blue-light); }
  .slot.selected { border: 2px solid var(--blue); background: var(--blue-light); }
  .slot.booked { background: var(--bg); cursor: default; opacity: 0.75; }
  .slot-time { font-size: 14px; font-weight: 500; }
  .slot.booked .slot-time { color: var(--text-ter); }
  .slot-info { font-size: 11px; margin-top: 4px; }
  .slot:not(.booked) .slot-info { color: var(--blue); }
  .slot.booked .slot-info { color: var(--text-ter); }
  .slot-name { font-size: 11px; color: var(--text-sec); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .form-card { background: var(--surface); border: 0.5px solid var(--border-med); border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 24px; }
  .form-card h2 { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
  .slot-badge { display: inline-block; background: var(--blue-light); color: var(--blue-dark); font-size: 12px; padding: 3px 10px; border-radius: 100px; margin-left: 8px; font-weight: 400; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text-sec); margin-bottom: 5px; }
  .field input { width: 100%; height: 38px; border: 0.5px solid var(--border-med); border-radius: var(--radius); background: var(--bg); color: var(--text); padding: 0 12px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.12s; }
  .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
  .btn-row { display: flex; gap: 8px; margin-top: 6px; }
  .btn-primary { padding: 9px 22px; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; cursor: pointer; font-family: inherit; transition: background 0.12s; display: flex; align-items: center; gap: 6px; }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-cancel { padding: 9px 16px; background: transparent; color: var(--text-sec); border: 0.5px solid var(--border-med); border-radius: var(--radius); font-size: 14px; cursor: pointer; font-family: inherit; }
  .btn-cancel:hover { background: var(--bg); }

  .toast { padding: 12px 16px; border-radius: var(--radius); font-size: 13px; margin-bottom: 16px; }
  .toast.success { background: var(--success-bg); color: var(--success-text); }
  .toast.error { background: var(--error-bg); color: var(--error-text); }
  .toast.hidden { display: none; }

  /* PIN overlay */
  .pin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .pin-overlay.hidden { display: none; }
  .pin-card { background: var(--surface); border-radius: var(--radius-lg); padding: 28px 32px; width: 300px; }
  .pin-card h3 { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .pin-card p { font-size: 13px; color: var(--text-sec); margin-bottom: 18px; }
  .pin-input { width: 100%; height: 44px; border: 0.5px solid var(--border-med); border-radius: var(--radius); background: var(--bg); color: var(--text); padding: 0 16px; font-size: 20px; letter-spacing: 0.2em; font-family: monospace; text-align: center; outline: none; }
  .pin-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
  .pin-error { font-size: 12px; color: var(--error-text); margin-top: 8px; min-height: 16px; }
  .pin-btn-row { display: flex; gap: 8px; margin-top: 16px; }

  /* Admin panel */
  .admin-panel { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 20px 24px; margin-top: 8px; }
  .admin-panel h3 { font-size: 15px; font-weight: 500; margin-bottom: 14px; }
  .booking-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; gap: 8px; }
  .booking-row:last-of-type { border-bottom: none; }
  .booking-when { font-weight: 500; white-space: nowrap; }
  .booking-who { color: var(--text-sec); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .booking-email { color: var(--text-ter); font-size: 11px; }
  .del-btn { background: none; border: 0.5px solid var(--border-med); cursor: pointer; color: var(--text-ter); font-size: 12px; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; font-family: inherit; }
  .del-btn:hover { color: #A32D2D; background: var(--error-bg); border-color: #F09595; }
  .export-btn { margin-top: 14px; padding: 7px 16px; font-size: 12px; color: var(--text-sec); border: 0.5px solid var(--border-med); border-radius: var(--radius); background: none; cursor: pointer; font-family: inherit; }
  .export-btn:hover { background: var(--bg); }
  .empty-state { font-size: 13px; color: var(--text-sec); padding: 8px 0; }
  .hidden { display: none !important; }

  @media (max-width: 480px) {
    .top-bar { padding: 12px 16px; }
    .main { padding: 16px 14px 40px; }
    .form-card { padding: 16px; }
  }
</style>
</head>
<body>

<!-- PIN overlay -->
<div class="pin-overlay hidden" id="pin-overlay">
  <div class="pin-card">
    <h3>Адмін-панель</h3>
    <p>Введіть пін-код для доступу</p>
    <input class="pin-input" type="password" inputmode="numeric" maxlength="4" id="pin-input" placeholder="····" autocomplete="off">
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-btn-row">
      <button class="btn-primary" onclick="checkPin()" style="flex:1">Увійти</button>
      <button class="btn-cancel" onclick="closePinOverlay()">Скасувати</button>
    </div>
  </div>
</div>

<div class="top-bar">
  <div class="top-bar-left">
    <div class="logo-dot">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/></svg>
    </div>
    <div>
      <h1>Переговорна кімната</h1>
      <p>Eurosatory 2026 · Стенд UA</p>
    </div>
  </div>
  <button class="admin-btn" id="admin-toggle-btn" onclick="handleAdminClick()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Адмін
  </button>
</div>

<div class="main">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-booked">—</div><div class="stat-label">заброньовано сьогодні</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-free">—</div><div class="stat-label">вільних слотів</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">всього за виставку</div></div>
  </div>

  <div class="days-row" id="days-nav"></div>

  <div id="toast" class="toast hidden"></div>
  <div class="form-card hidden" id="booking-form">
    <h2>Бронювання<span class="slot-badge" id="form-slot-label"></span></h2>
    <div class="field"><label>Ім'я та прізвище</label><input type="text" id="inp-name" placeholder="Іван Петренко" autocomplete="name"></div>
    <div class="field"><label>Компанія</label><input type="text" id="inp-company" placeholder="Defense Tech LLC" autocomplete="organization"></div>
    <div class="field"><label>Email (необов'язково)</label><input type="email" id="inp-email" placeholder="ivan@company.com" autocomplete="email"></div>
    <div class="btn-row">
      <button class="btn-primary" id="confirm-btn" onclick="confirmBooking()">Підтвердити</button>
      <button class="btn-cancel" onclick="cancelForm()">Скасувати</button>
    </div>
  </div>

  <div class="section-label">
    <span id="slots-section-label">Слоти</span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()" title="Оновити">↻</button>
  </div>
  <div class="slots-grid" id="slots-grid"><div style="font-size:13px;color:var(--text-sec)">Завантаження...</div></div>

  <div class="admin-panel hidden" id="admin-panel">
    <h3>Усі бронювання</h3>
    <div id="admin-list"></div>
    <button class="export-btn" onclick="exportCSV()">↓ Експорт CSV</button>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzNRj2bf5T4XRM4M9cXSx7NAjB9gRBYg79GUEA7yhGfpojQxsgVqwMyj4u1gtlIJxyv/exec';
const PIN = '2061';

const DAYS = [
  { label: 'Пн 16.06', key: '2026-06-16' },
  { label: 'Вт 17.06', key: '2026-06-17' },
  { label: 'Ср 18.06', key: '2026-06-18' },
  { label: 'Чт 19.06', key: '2026-06-19' },
  { label: 'Пт 20.06', key: '2026-06-20' },
];
const SLOTS = [];
for (let h = 10; h < 19; h++) {
  SLOTS.push(String(h).padStart(2,'0') + ':00');
  SLOTS.push(String(h).padStart(2,'0') + ':30');
}

let bookings = {};
let selectedDay = DAYS[0].key;
let selectedSlot = null;
let adminUnlocked = false;
let adminVisible = false;
let loading = false;

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try {
    const res = await fetch(API + '?action=getAll');
    const data = await res.json();
    if (data.ok) {
      bookings = {};
      data.rows.forEach(r => {
        if (!bookings[r.day_key]) bookings[r.day_key] = {};
        bookings[r.day_key][r.slot] = { name: r.name, company: r.company, email: r.email };
      });
    } else {
      showToast('Помилка завантаження даних', 'error');
    }
  } catch(e) {
    showToast('Немає зв\'язку з сервером', 'error');
  }
  btn.classList.remove('spinning');
  render();
}

function render() {
  renderDays();
  renderSlots();
  renderStats();
  if (adminVisible) renderAdmin();
}

function renderDays() {
  document.getElementById('days-nav').innerHTML = DAYS.map(d =>
    `<button class="day-btn${d.key === selectedDay ? ' active' : ''}" onclick="selectDay('${d.key}')">${d.label}</button>`
  ).join('');
}

function renderSlots() {
  const db = bookings[selectedDay] || {};
  const dayLabel = DAYS.find(d => d.key === selectedDay).label;
  document.getElementById('slots-section-label').textContent = 'Слоти — ' + dayLabel;
  document.getElementById('slots-grid').innerHTML = SLOTS.map(slot => {
    const b = db[slot];
    if (b) {
      return `<div class="slot booked">
        <div class="slot-time">${slot}</div>
        <div class="slot-info">зайнято</div>
        <div class="slot-name">${esc(b.name)}</div>
        <div class="slot-name" style="color:var(--text-ter)">${esc(b.company)}</div>
      </div>`;
    }
    const sel = selectedSlot === slot;
    return `<div class="slot${sel ? ' selected' : ''}" onclick="selectSlot('${slot}')">
      <div class="slot-time">${slot}</div>
      <div class="slot-info">вільно</div>
    </div>`;
  }).join('');
}

function renderStats() {
  const db = bookings[selectedDay] || {};
  const booked = Object.keys(db).length;
  document.getElementById('stat-booked').textContent = booked;
  document.getElementById('stat-free').textContent = SLOTS.length - booked;
  let total = 0;
  Object.values(bookings).forEach(d => total += Object.keys(d).length);
  document.getElementById('stat-total').textContent = total;
}

function renderAdmin() {
  const list = document.getElementById('admin-list');
  const items = [];
  DAYS.forEach(day => {
    const db = bookings[day.key] || {};
    SLOTS.forEach(slot => {
      const b = db[slot];
      if (b) items.push({ dayLabel: day.label, dayKey: day.key, slot, ...b });
    });
  });
  if (!items.length) {
    list.innerHTML = '<p class="empty-state">Немає бронювань</p>';
    return;
  }
  list.innerHTML = items.map(i =>
    `<div class="booking-row">
      <span class="booking-when">${esc(i.dayLabel)} ${esc(i.slot)}</span>
      <span class="booking-who">${esc(i.name)} · ${esc(i.company)}${i.email ? ` <span class="booking-email">${esc(i.email)}</span>` : ''}</span>
      <button class="del-btn" onclick="deleteBooking('${i.dayKey}','${i.slot}')">Скасувати</button>
    </div>`
  ).join('');
}

function selectDay(key) {
  selectedDay = key;
  selectedSlot = null;
  document.getElementById('booking-form').classList.add('hidden');
  render();
}

function selectSlot(slot) {
  if ((bookings[selectedDay] || {})[slot]) return;
  selectedSlot = slot;
  const dayLabel = DAYS.find(d => d.key === selectedDay).label;
  document.getElementById('form-slot-label').textContent = dayLabel + ', ' + slot;
  document.getElementById('booking-form').classList.remove('hidden');
  document.getElementById('inp-name').focus();
  renderSlots();
}

function cancelForm() {
  selectedSlot = null;
  document.getElementById('booking-form').classList.add('hidden');
  renderSlots();
}

async function confirmBooking() {
  const name = document.getElementById('inp-name').value.trim();
  const company = document.getElementById('inp-company').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  if (!name) { showToast("Введіть ім'я", 'error'); return; }
  if (!company) { showToast('Введіть назву компанії', 'error'); return; }

  const btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.textContent = 'Зберігаємо...';

  try {
    const res = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action: 'book', day_key: selectedDay, slot: selectedSlot, name, company, email })
    });
    const data = await res.json();
    if (data.ok) {
      if (!bookings[selectedDay]) bookings[selectedDay] = {};
      bookings[selectedDay][selectedSlot] = { name, company, email };
      document.getElementById('inp-name').value = '';
      document.getElementById('inp-company').value = '';
      document.getElementById('inp-email').value = '';
      document.getElementById('booking-form').classList.add('hidden');
      selectedSlot = null;
      showToast('Заброньовано: ' + name + ' · ' + company, 'success');
      render();
    } else if (data.error === 'already_booked') {
      showToast('Цей слот вже зайнятий — оновіть сторінку', 'error');
      loadData();
    } else {
      showToast('Помилка збереження', 'error');
    }
  } catch(e) {
    showToast('Немає зв\'язку з сервером', 'error');
  }

  btn.disabled = false;
  btn.textContent = 'Підтвердити';
}

async function deleteBooking(dayKey, slot) {
  if (!confirm('Скасувати це бронювання?')) return;
  try {
    const res = await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action: 'cancel', day_key: dayKey, slot })
    });
    const data = await res.json();
    if (data.ok) {
      if (bookings[dayKey]) delete bookings[dayKey][slot];
      showToast('Бронювання скасовано', 'success');
      render();
    } else {
      showToast('Помилка скасування', 'error');
    }
  } catch(e) {
    showToast('Немає зв\'язку з сервером', 'error');
  }
}

function handleAdminClick() {
  if (adminUnlocked) {
    toggleAdmin();
  } else {
    document.getElementById('pin-overlay').classList.remove('hidden');
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-error').textContent = '';
    setTimeout(() => document.getElementById('pin-input').focus(), 50);
  }
}

function checkPin() {
  const val = document.getElementById('pin-input').value.trim();
  if (val === PIN) {
    adminUnlocked = true;
    closePinOverlay();
    toggleAdmin(true);
  } else {
    document.getElementById('pin-error').textContent = 'Невірний пін-код';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-input').focus();
  }
}

function closePinOverlay() {
  document.getElementById('pin-overlay').classList.add('hidden');
}

function toggleAdmin(forceOpen) {
  adminVisible = forceOpen !== undefined ? forceOpen : !adminVisible;
  document.getElementById('admin-panel').classList.toggle('hidden', !adminVisible);
  document.getElementById('admin-toggle-btn').classList.toggle('active', adminVisible);
  if (adminVisible) renderAdmin();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.add('hidden'), 3500);
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportCSV() {
  const rows = [['День','Час',"Ім'я","Компанія","Email"]];
  DAYS.forEach(day => {
    const db = bookings[day.key] || {};
    SLOTS.forEach(slot => {
      const b = db[slot];
      if (b) rows.push([day.label, slot, b.name, b.company, b.email || '']);
    });
  });
  const csv = '\uFEFF' + rows.map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'eurosatory_bookings.csv';
  a.click();
}

document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(); });
document.getElementById('pin-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closePinOverlay(); });

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
